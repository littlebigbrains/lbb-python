name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install (editable, dev extras)
        run: python -m pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: Mypy (strict)
        run: mypy lbb
      - name: Tests + coverage
        run: pytest --cov
      - name: Build sdist + wheel
        run: |
          python -m build
          python -m twine check dist/*
      - name: Wheel content assertion
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          wheel = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          bad = [n for n in names if not (n.startswith("lbb/") or ".dist-info/" in n)]
          if bad:
              sys.exit(f"unexpected files in wheel: {bad}")
          for required in ("lbb/__init__.py", "lbb/py.typed", "lbb/models.py"):
              if required not in names:
                  sys.exit(f"expected {required} missing from wheel")
          PY
      - name: Clean-environment install + import smoke
        run: |
          python -m venv /tmp/clean-venv
          /tmp/clean-venv/bin/pip install dist/*.whl
          /tmp/clean-venv/bin/python -c "import lbb; from lbb import LbbClient, AsyncLbbClient; print(lbb.__name__)"
