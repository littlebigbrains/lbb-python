name: release

# Publishes lbb-sdk to PyPI from a signed vX.Y.Z tag via PyPI trusted
# publishing (OIDC) — no long-lived registry tokens. Publishing is immutable:
# a bad release is yanked and fixed forward, never re-published.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Tag matches package version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          [ "$tag" = "$version" ] || { echo "::error::tag v${tag} != pyproject version ${version}"; exit 1; }

  publish-pypi:
    needs: [ci, version-check]
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      contents: read
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          python -m pip install 'build==1.5.1' 'twine==6.2.0' 'packaging==26.2'
          python -m build
          python -m twine check dist/*
      - name: Publish lbb-sdk to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
